name: E2E Tests - Mark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1-5'  # executa todo dia útil às 8h (UTC)

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    name: Executar Testes Playwright
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4.2.2

      - name: Configurar Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Instalar dependências da API
        working-directory: apps/api
        run: yarn install

      - name: Inicializar banco de dados
        working-directory: apps/api
        run: ./node_modules/typeorm/cli.js migration:run
        env:
          NODE_ENV: development

      - name: Iniciar API em background
        working-directory: apps/api
        run: node src/server.js &
        env:
          NODE_ENV: development
          PORT: 3333

      - name: Instalar dependências do Web
        working-directory: apps/web
        run: yarn install

      - name: Iniciar Web em background
        working-directory: apps/web
        run: npx http-server --port 8080 &

      - name: Aguardar serviços subirem
        run: npx wait-on http://localhost:3333/tasks http://localhost:8080 --timeout 30000

      - name: Instalar dependências dos testes
        run: yarn install

      - name: Instalar browsers do Playwright
        run: npx playwright install chromium --with-deps

      - name: Executar testes
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8080
          BASE_API: http://localhost:3333
        continue-on-error: true

      - name: Publicar relatório no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          destination_dir: report

      - name: Upload dos resultados como artefato
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
